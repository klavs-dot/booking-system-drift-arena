
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift Arena — Rezervācijas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DRIFT ARENA — Brand Design System
   Primārās krāsas pēc brand book:
   Oranžā (primary accent): #E84D0E
   Melns (primary bg):       #111111
   Tumši pelēks (surface):   #1C1C1C
   Pelēks (card):            #242424
   Gaišs pelēks (border):    #333333
   Balts (text):             #FFFFFF
   Sekundārais teksts:       #999999
   Statusi: zaļš #22C55E, dzeltens #F59E0B, sarkans #EF4444
================================================================ */
:root {
  /* Brand krāsas — Drift Arena */
  --bg:        #0F0F0F;
  --surface:   #161616;
  --card:      #1E1E1E;
  --card2:     #272727;
  --border:    #2E2E2E;
  --border2:   #3D3D3D;

  /* Primārā akcenta krāsa — Drift Arena oranžā */
  --accent:     #E84D0E;
  --accent2:    #FF5C1A;
  --accent-dim: #3A1506;
  --accent-mid: #6B2208;

  /* Statusa krāsas */
  --green:      #22C55E;
  --green-dim:  #052512;
  --yellow:     #F59E0B;
  --yellow-dim: #2D1E03;
  --red:        #EF4444;
  --red-dim:    #2D0808;

  /* Teksts */
  --text:  #F0F0F0;
  --text2: #888888;
  --text3: #555555;

  /* Forma */
  --r:  6px;
  --rs: 4px;
  --sh: 0 4px 24px rgba(0,0,0,.6);

  /* Brand fonts */
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.5;
  /* Subtils chevron pattern fons — brand motīvs */
  background-image: url("data:image/svg+xml,%3Csvg width='40' height='20' viewBox='0 0 40 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20 L10 0 L12 0 L2 20z M10 20 L20 0 L22 0 L12 20z M20 20 L30 0 L32 0 L22 20z M30 20 L40 0 L42 0 L32 20z' fill='%23FFFFFF' fill-opacity='0.018'/%3E%3C/svg%3E");
  background-size: 40px 20px;
}
button,input,select,textarea{font-family:var(--font-body)}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR — brand orange left stripe ── */
.topbar {
  height: 88px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}
/* Stats bloks topbarā */
.topstats {
  display: flex;
  gap: 6px;
  flex: 1;
  justify-content: center;
  align-items: center;
}
.tstat {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--border2);
  padding: 4px 12px;
  min-width: 80px;
  position: relative;
}
.tstat:hover { border-bottom-color: var(--accent); }
.tstat-lbl {
  font-family: var(--font-head);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap;
}
.tstat-row {
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.tstat-val {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  letter-spacing: 0;
}
.tstat-sub {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.tstat-sep {
  color: var(--text);
  font-size: 18px;
  font-weight: 300;
  align-self: center;
  margin: 0 2px;
}
.tstat-val.pos { color: var(--green); }

/* ── LOGO — brand Barlow Condensed, caps ── */
.logo {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap;
}
.logo span {
  color: var(--accent);
}

/* ── NAV BUTTONS ── */
.nav{display:flex;gap:2px;flex:1}
.nb {
  background: none;
  border: none;
  color: var(--text2);
  padding: 9px 18px;
  border-radius: 0;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all .15s;
  white-space: nowrap;
  position: relative;
}
.nb::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform .15s;
}
.nb:hover {
  color: var(--text);
  background: rgba(232,77,14,.08);
}
.nb:hover::after { transform: scaleX(1); }
.nb.active {
  color: var(--accent);
  background: rgba(232,77,14,.1);
}
.nb.active::after { transform: scaleX(1); }
.nb-new {
  background: var(--accent) !important;
  color: #fff !important;
  margin-left: auto;
  border-radius: 0 !important;
  letter-spacing: 2px;
  font-size: 15px;
  font-weight: 900;
  padding: 0 28px;
  height: 46px;
}
.nb-new::after { display:none; }
.nb-new:hover { background: var(--accent2) !important; }
.nb-new-wrap {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-self: stretch;
  justify-content: center;
}
.nb-new-sub {
  background: var(--surface) !important;
  color: var(--text2) !important;
  border: 1px solid var(--border2) !important;
  border-radius: 0 !important;
  font-family: var(--font-head);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  transition: all .15s;
  width: 100%;
  text-align: center;
  white-space: nowrap;
}
.nb-new-sub:hover {
  background: var(--card) !important;
  color: var(--text) !important;
  border-color: var(--accent) !important;
}

/* ── CAPACITY PILL ── */
.cap-pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
  border-radius: 0;
  padding: 5px 14px;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text2);
  white-space: nowrap;
}
.cap-pill b{color:var(--accent)}

.main{flex:1;padding:28px 24px;max-width:1440px;margin:0 auto;width:100%}
.view{display:none} .view.active{display:block}

/* ── PAGE HEADER ── */
.phdr{margin-bottom:28px}
.ptitle {
  font-family: var(--font-head);
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  /* Oranžā akcenta līnija kreisajā pusē */
  border-left: 4px solid var(--accent);
  padding-left: 16px;
  line-height: 1;
}
.psub{font-size:13px;color:var(--text2);margin-top:8px;padding-left:20px}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border2);
  border-radius: var(--r);
  padding: 20px;
}

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 0;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.ba { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
.bd { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.bc { background: var(--red-dim);       color: var(--red);   border: 1px solid rgba(239,68,68,.3); }

/* ── FORM FIELDS ── */
.field{margin-bottom:16px}
.field label {
  display: block;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 6px;
}
.req{color:var(--accent)}
.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--border2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: var(--rs);
  font-size: 14px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--card);
}
.field textarea{resize:vertical;min-height:72px}
.hint{font-size:11px;color:var(--text3);margin-top:5px}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  border-radius: 0;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: none;
  transition: all .15s;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background .15s;
}
.btn:hover::before { background: rgba(255,255,255,.06); }

/* Primary — Drift Arena oranžā */
.btn-p {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px rgba(232,77,14,.3);
}
.btn-p:hover {
  background: var(--accent2);
  box-shadow: 0 4px 20px rgba(232,77,14,.5);
}
.btn-p:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }

/* Secondary */
.btn-s {
  background: var(--card2);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-s:hover { color: var(--text); border-color: var(--text3); }

/* Ghost */
.btn-g {
  background: none;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-g:hover { color: var(--text); border-color: var(--text3); }

/* Danger — delete */
.btn-d {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(239,68,68,.25);
}
.btn-d:hover { background: rgba(239,68,68,.2); border-color: var(--red); }

/* Success — notikusi */
.btn-ok {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(34,197,94,.25);
}
.btn-ok:hover { background: rgba(34,197,94,.2); border-color: var(--green); }

/* Move — pārcelt */
.btn-mv {
  background: var(--yellow-dim);
  color: var(--yellow);
  border: 1px solid rgba(245,158,11,.25);
}
.btn-mv:hover { background: rgba(245,158,11,.2); border-color: var(--yellow); }

.btn-sm { padding: 5px 12px; font-size: 11px; }
.btn-full { width:100%; justify-content:center; padding:14px; font-size:15px; letter-spacing:2px; }

/* ── SPINNER / OVERLAY ── */
.sp {
  width:18px;height:18px;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:inline-block
}

.overlay {
  position:fixed;inset:0;
  background:rgba(15,15,15,.92);
  display:none;align-items:center;justify-content:center;z-index:999
}
.overlay.on{display:flex}
.ovlbox {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: var(--r);
  padding: 36px 52px;
  text-align: center;
}
.ovlbox p{color:var(--text2);margin-top:14px;font-size:14px}

/* ── TOAST ── */
.toast {
  position:fixed;bottom:28px;right:28px;z-index:1000;
  background:var(--card);
  border:1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius:0;
  padding:14px 20px;font-size:14px;max-width:360px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transform:translateX(12px);opacity:0;transition:all .25s;pointer-events:none;
  font-family: var(--font-body);
}
.toast.on{transform:translateX(0);opacity:1}
.toast.ok  {border-left-color:var(--green); color:var(--green)}
.toast.err {border-left-color:var(--red);   color:var(--red)}
.toast.warn{border-left-color:var(--yellow);color:var(--yellow)}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(15,15,15,.85);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
/* Rediģēšanas, dzēšanas un pārcelšanas modāļi ir augstāk par dienas modāli */
#M_EDIT,#M_MOVE,#M_DEL{z-index:600}
.mbg.on{display:flex}
.mbox {
  background:var(--card);
  border:1px solid var(--border);
  border-top:3px solid var(--accent);
  border-radius:var(--r);
  padding:28px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,.7);
}
.mtitle {
  font-family: var(--font-head);
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  color: var(--text);
}
.mfoot {
  display:flex;gap:10px;justify-content:flex-end;
  margin-top:20px;padding-top:16px;
  border-top:1px solid var(--border);
}

/* ── CALENDAR ── */
.cctrls{display:flex;gap:10px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.cctrls select {
  background:var(--card);
  border:1px solid var(--border);
  border-bottom:2px solid var(--accent);
  color:var(--text);
  padding:9px 14px;
  border-radius:var(--rs);
  font-size:14px;
  font-family:var(--font-head);
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  outline:none;
  cursor:pointer;
}
.cnbtn {
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text2);
  width:38px;height:38px;
  border-radius:0;
  font-size:18px;
  font-weight:700;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.cnbtn:hover{color:var(--text);background:var(--accent);border-color:var(--accent)}

.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.chdr {
  text-align:center;
  font-family:var(--font-head);
  font-size:11px;font-weight:800;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:1.2px;
  padding:8px 4px;
  border-bottom:2px solid var(--accent);
}

.cday {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:0;
  padding:8px 7px;
  min-height:100px;
  cursor:pointer;
  transition:all .15s;
  overflow:hidden;
  position:relative;
}
.cday:hover {
  border-color:var(--accent);
  background:var(--card2);
  transform:translateY(-1px);
}
.cday.tdy {
  border-color:var(--accent);
  border-top:2px solid var(--accent);
  background: linear-gradient(180deg, rgba(232,77,14,.08) 0%, var(--card) 100%);
}
.cday.eday{background:none;border-color:transparent;cursor:default;min-height:0;transform:none}
.cdnum {
  font-family:var(--font-head);
  font-size:18px;font-weight:900;
  color:var(--text);
  margin-bottom:6px;
  letter-spacing:.5px;
}
.cday.tdy .cdnum{color:var(--accent)}
.cday:hover .cdnum{color:var(--text)}

.cslots{display:flex;flex-direction:column;gap:3px}
.cslot{display:flex;align-items:center;gap:4px;font-size:10px}
.cslbl{color:var(--text3);flex-shrink:0;width:22px;font-family:var(--font-head);font-weight:700;letter-spacing:.5px}
.ctrk{flex:1;height:3px;background:var(--border);border-radius:0;overflow:hidden}
.cfil{height:100%;border-radius:0;transition:width .4s}
/* Status colours aligned to brand */
.s0{background:var(--border)}
.s1{background:var(--accent)}
.s2{background:var(--yellow)}
.s3{background:var(--green)}
.s4{background:var(--red)}
.cnum{font-size:12px;color:var(--text);min-width:22px;text-align:right;font-family:var(--font-head);font-weight:900}

.cleg {
  display:flex;gap:16px;flex-wrap:wrap;
  margin-bottom:16px;font-size:11px;color:var(--text2);
  font-family:var(--font-head);font-weight:700;letter-spacing:.8px;text-transform:uppercase;
}
.cli{display:flex;align-items:center;gap:6px}
.cld{width:10px;height:10px;border-radius:0}

/* ── TODAY ── */
.thdr{display:flex;align-items:baseline;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.tdate {
  font-family:var(--font-head);
  font-size:40px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;
}
.tsub{font-size:13px;color:var(--text2);font-family:var(--font-head);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.blist{display:flex;flex-direction:column;gap:8px}

/* ── BOOKING CARD ── */
.bcard {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:0;
  border-left:4px solid #3b82f6;
  padding:14px 20px;
  display:block;
  
  gap:16px;align-items:start;
  position:relative;overflow:hidden;
  transition:all .15s;
}
.bcard:hover {
  border-color:var(--border2);
  background:var(--card2);
  transform:translateX(2px);
}
.bcard.sdone { border-left-color: var(--green); opacity:.6; }
.bcard.sdone .bcc { text-decoration:line-through; }
.bcard.scanc { border-left-color: var(--red); opacity:.5; }
.bcard.sarrived { border-left-color: var(--green); border-top: 2px solid rgba(34,197,94,.4); }

/* Pulsējošais banneris — Ieradušies */
@keyframes nowpulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,.45); }
  50%      { opacity:.85; box-shadow:0 0 0 8px rgba(34,197,94,0); }
}
@keyframes outsidewarn {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(239,68,68,.5); }
  50%      { opacity:.88; box-shadow:0 0 0 10px rgba(239,68,68,0); }
}
.outside-warn-banner {
  display: none;
  align-items: center;
  gap: 14px;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.4);
  border-left: 5px solid var(--red);
  padding: 12px 20px;
  margin-top: 14px;
  animation: outsidewarn 1.8s ease-in-out infinite;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--red);
}
.outside-warn-banner.show { display: flex; }
.outside-warn-dot {
  width: 9px; height: 9px;
  background: var(--red);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--red);
  flex-shrink: 0;
  animation: outsidewarn 1.8s ease-in-out infinite;
}
@keyframes outsidepulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(232,77,14,.5); }
  50%      { opacity:.85; box-shadow:0 0 0 8px rgba(232,77,14,0); }
}
.boutside {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(232,77,14,.1);
  border: 1px solid rgba(232,77,14,.35);
  border-left: 4px solid var(--accent);
  padding: 8px 20px;
  margin-top: 6px;
  animation: outsidepulse 2s ease-in-out infinite;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
}
@keyframes closedpulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(232,77,14,.5); }
  50%      { opacity:.82; box-shadow:0 0 0 10px rgba(232,77,14,0); }
}
.bclosed {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(232,77,14,.1);

/* Checkbox slēgtajam pasākumam */
.closed-toggle {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);

  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.closed-toggle:hover { background: var(--accent-dim); }
.closed-toggle input[type=checkbox] {
  width: 20px; height: 20px;
  accent-color: var(--accent);

  flex-shrink: 0;
}
.closed-toggle-lbl {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;

}

  border-color: var(--accent);
}

@keyframes nowdot {

@keyframes spin { to { transform:rotate(360deg); } }
.bnow {

  padding: 10px 20px;
  margin-top: 8px;

  font-weight: 900;
  letter-spacing: 2px;

.bnow-dot {

.btn-arr {

/* Time column */

/* Body */

.bmeta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);font-family:var(--font-body)}
.bcmt{margin-top:7px;font-size:14px;color:var(--text);font-weight:500}

/* Section separator */

/* ── CAPACITY DISPLAY ── */
/* ── SCANNING LOADER ── */
@keyframes scanline {
  0%   { transform: translateY(-100%); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(400%); opacity: 0; }
}
@keyframes scan-flicker {
  0%,100% { opacity:1 }
  92%     { opacity:1 }
  93%     { opacity:.4 }
  94%     { opacity:1 }
  96%     { opacity:.6 }
  97%     { opacity:1 }
}
@keyframes scan-blink {
  0%,49% { opacity:1 }
  50%,100%{ opacity:0 }
}
@keyframes bar-fill {
  from { width: 0% }
}
@keyframes greenin {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}
.cap-ok-banner {
  margin-top: 14px;
  background: rgba(34,197,94,.08);
  border: 1px solid rgba(34,197,94,.3);
  border-left: 4px solid var(--green);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: greenin .3s ease both;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
}
.cap-ok-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}
.cap-scanning {
  margin-top: 14px;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-left: 4px solid var(--accent);
  padding: 20px 20px 16px;
  position: relative;
  overflow: hidden;
  animation: scan-flicker 3s infinite;
}
.cap-scanning::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scanline 1.4s linear infinite;
  pointer-events: none;
}
.scan-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.scan-title::after {
  content: '█';
  animation: scan-blink .8s step-end infinite;
  font-size: 13px;
}
.scan-bars {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.scan-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.scan-row-lbl {
  font-family: var(--font-head);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  width: 90px;
  flex-shrink: 0;
}
.scan-row-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  overflow: hidden;
}
.scan-row-fill {
  height: 100%;
  background: var(--accent);
  animation: scan-flicker 2s infinite;
}
/* ── CAPACITY RESULT BOX ── */
.occbox {
  margin-top: 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 4px solid var(--accent);
  padding: 0;
  overflow: hidden;
  position: relative;
}
.occbox-hdr {
  background: rgba(232,77,14,.08);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  font-family: var(--font-head);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.occbox-hdr span { color: var(--text3); font-size: 9px; letter-spacing: 2px; }
.ocrow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.ocrow:last-child { border-bottom: none; }
.oclbl {
  font-family: var(--font-head);
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}
.ocval {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #fff;
}
.cv-ok   { color: var(--green); }
.cv-warn { color: var(--yellow); }
.cv-full { color: var(--accent); }
/* Big capacity bar */
.cbtr-wrap {
  padding: 12px 16px 14px;
  background: rgba(0,0,0,.2);
  border-top: 1px solid var(--border);
}
.cbtr-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-head);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 6px;
}
.cbtr {
  height: 12px;
  background: var(--border);
  border: 1px solid var(--border2);
  overflow: hidden;
  position: relative;
}
.cbfil {
  height: 100%;
  transition: width .7s cubic-bezier(.23,1,.32,1), background .4s;
  animation: bar-fill .7s cubic-bezier(.23,1,.32,1) both;
  position: relative;
}
.cbfil::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 3px;
  background: rgba(255,255,255,.6);
}
.cbtr-pct {
  margin-top: 5px;
  text-align: right;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;

/* Error/capacity exceeded box */
.ebox {
  background:var(--accent-dim);

  border-left:4px solid var(--accent);

/* Alternative time buttons */
.altgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:6px;margin-top:10px}
.altbtn {

}

}
.alttime{font-family:var(--font-head);font-size:15px;font-weight:900;letter-spacing:.5px}
.altfree{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--font-head);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.altbtn:hover .altfree{color:var(--accent)}
.altbtn-nearest{border-color:var(--green);border-bottom-color:var(--green);background:rgba(34,197,94,.07)}
.altbtn-nearest .alttime{color:var(--green)}
.altnearest{font-family:var(--font-head);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:4px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.eico{font-size:36px;margin-bottom:12px}
